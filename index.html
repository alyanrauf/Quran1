<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اضافت کے قرآنی الفاظ — پارہ ۲۵ تا ۳۰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap');

  :root{
    --parchment: #f3ead9;
    --parchment-deep: #e8dcc2;
    --ink: #2b2620;
    --ink-soft: #5a4f3f;
    --maroon: #7a2e2e;
    --maroon-deep: #5c2020;
    --gold: #a9792f;
    --gold-bright: #c79a3f;
    --teal: #2f5d57;
    --line: rgba(122,46,46,0.22);
    --shadow: rgba(43,38,32,0.35);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--ink);
    font-family: 'Noto Nastaliq Urdu', serif;
    overflow: hidden;
  }

  /* ===== Background texture ===== */
  body{
    background:
      radial-gradient(ellipse at 20% 20%, rgba(169,121,47,0.08), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(122,46,46,0.10), transparent 50%),
      var(--ink);
  }

  .deck{
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .slide{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transform: scale(0.97);
    transition: opacity 0.5s ease, transform 0.5s ease, visibility 0.5s;
    padding: 28px;
  }
  .slide.active{
    opacity: 1;
    visibility: visible;
    transform: scale(1);
  }

  .card{
    position: relative;
    width: min(900px, 94vw);
    height: min(640px, 90vh);
    background: var(--parchment);
    border-radius: 6px;
    box-shadow: 0 30px 70px var(--shadow), 0 0 0 1px rgba(169,121,47,0.4);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== Ornamental border frame, echoing the manuscript scans ===== */
  .card::before{
    content:"";
    position:absolute;
    inset: 14px;
    border: 2px solid var(--gold);
    border-radius: 3px;
    pointer-events:none;
    opacity:0.55;
  }
  .card::after{
    content:"";
    position:absolute;
    inset: 22px;
    border: 1px solid var(--maroon);
    border-radius: 2px;
    pointer-events:none;
    opacity:0.25;
  }

  .card-inner{
    position: relative;
    z-index: 2;
    margin: 34px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .card-inner::-webkit-scrollbar{ width: 6px; }
  .card-inner::-webkit-scrollbar-thumb{ background: var(--gold); border-radius: 4px; }

  /* ===== TITLE / COVER SLIDE ===== */
  .cover{
    text-align: center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    gap: 18px;
    padding: 0 20px;
  }
  .cover .bismillah{
    font-family:'Amiri', serif;
    font-size: 28px;
    color: var(--maroon-deep);
    margin-bottom: 6px;
  }
  .cover h1{
    font-family:'Noto Nastaliq Urdu', serif;
    font-size: 44px;
    color: var(--ink);
    margin: 0;
    line-height: 1.5;
  }
  .cover .subtitle{
    font-size: 20px;
    color: var(--ink-soft);
    max-width: 560px;
    line-height: 2;
  }
  .cover .scope-badge{
    margin-top: 14px;
    display:inline-flex;
    gap:10px;
    padding: 10px 22px;
    border: 1.5px solid var(--gold);
    border-radius: 999px;
    color: var(--maroon-deep);
    font-size: 17px;
    background: rgba(169,121,47,0.08);
  }
  .cover .hint{
    margin-top: 26px;
    font-size: 15px;
    color: var(--ink-soft);
    opacity: 0.8;
  }

  /* ===== Section divider slide ===== */
  .section-divider{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    gap: 14px;
  }
  .section-divider .eyebrow{
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 17px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .section-divider .big-word{
    font-family: 'Amiri', serif;
    font-size: 84px;
    color: var(--maroon-deep);
    line-height: 1.3;
  }
  .section-divider .desc{
    font-size: 19px;
    color: var(--ink-soft);
    max-width: 520px;
    line-height: 1.9;
  }

  /* ===== Word/Ayah slide ===== */
  .top-row{
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
    border-bottom: 1.5px dashed var(--line);
    padding-bottom: 16px;
  }
  .group-tag{
    font-size: 14px;
    color: var(--gold);
    background: rgba(169,121,47,0.12);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 4px 14px;
    white-space: nowrap;
  }
  .slide-counter{
    font-size: 14px;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  .phrase-block{
    text-align:center;
    margin: 6px 0 20px;
  }
  .phrase-arabic{
    font-family:'Amiri', serif;
    font-size: 42px;
    color: var(--maroon-deep);
    line-height: 1.6;
    margin: 0;
  }
  .phrase-meaning{
    font-size: 20px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .ayah-card{
    background: var(--parchment-deep);
    border-right: 5px solid var(--teal);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .ayah-arabic{
    font-family:'Amiri', serif;
    font-size: 28px;
    color: var(--ink);
    line-height: 2.1;
    text-align: center;
    margin: 0 0 14px;
  }
  .ayah-translation{
    font-size: 18px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.9;
    margin: 0;
  }

  .ref-row{
    display:flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .ref-pill{
    font-size: 15px;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--maroon);
    color: var(--maroon-deep);
    background: rgba(122,46,46,0.06);
  }
  .ref-pill.juz{
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(169,121,47,0.08);
  }

  .note-block{
    font-size: 17px;
    color: var(--ink-soft);
    line-height: 2;
    text-align: right;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
    margin-top: auto;
  }
  .note-label{
    color: var(--teal);
    font-weight: 600;
    margin-left: 6px;
  }

  /* ===== Nav controls ===== */
  .nav-controls{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display:flex;
    align-items:center;
    gap: 18px;
    z-index: 50;
  }
  .nav-btn{
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: rgba(243,234,217,0.12);
    color: var(--parchment);
    font-size: 20px;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-btn:hover{ background: rgba(169,121,47,0.35); transform: scale(1.06); }
  .nav-btn:active{ transform: scale(0.95); }
  .nav-progress{
    color: var(--parchment);
    font-size: 14px;
    opacity: 0.75;
    min-width: 70px;
    text-align:center;
    direction: ltr;
    unicode-bidi: isolate;
  }

  .toc-btn{
    position: fixed;
    top: 22px;
    left: 22px;
    z-index: 60;
    background: rgba(243,234,217,0.12);
    border: 1.5px solid var(--gold);
    color: var(--parchment);
    border-radius: 999px;
    padding: 9px 20px;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Noto Nastaliq Urdu', serif;
  }
  .toc-btn:hover{ background: rgba(169,121,47,0.3); }

  /* ===== TOC overlay ===== */
  .toc-overlay{
    position: fixed;
    inset: 0;
    background: rgba(20,17,14,0.92);
    z-index: 80;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility: hidden;
    transition: opacity 0.3s;
  }
  .toc-overlay.open{ opacity:1; visibility:visible; }
  .toc-panel{
    width: min(560px, 90vw);
    max-height: 80vh;
    overflow-y: auto;
    background: var(--parchment);
    border-radius: 8px;
    padding: 30px;
    border: 1.5px solid var(--gold);
  }
  .toc-panel h2{
    text-align:center;
    color: var(--maroon-deep);
    font-size: 24px;
    margin: 0 0 18px;
  }
  .toc-item{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 12px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .toc-item:hover{ background: rgba(169,121,47,0.12); border-color: var(--gold); }
  .toc-item .toc-phrase{
    font-family:'Amiri', serif;
    font-size: 19px;
    color: var(--maroon-deep);
  }
  .toc-item .toc-ref{
    font-size: 13px;
    color: var(--ink-soft);
  }
  .toc-section-label{
    font-size: 14px;
    color: var(--gold);
    margin: 18px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line);
  }
  .toc-close{
    display:block;
    margin: 18px auto 0;
    background: var(--maroon-deep);
    color: var(--parchment);
    border: none;
    padding: 10px 28px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: 15px;
  }

  kbd{
    background: rgba(169,121,47,0.18);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: monospace;
    color: var(--parchment);
  }

@media (max-width: 640px){
  .deck{ height: 100vh; height: 100dvh; }

  .slide{ padding: 12px; padding-top: 64px; padding-bottom: 84px; }

  .card{
    width: 100%;
    height: 100%;
    border-radius: 4px;
  }
  .card::before{ inset: 8px; }
  .card::after{ inset: 14px; }

  .card-inner{
    margin: 18px;
    overflow-y: auto;
  }

  .cover .bismillah{ font-size: 20px; }
  .cover h1{ font-size: 26px; line-height: 1.6; }
  .cover .subtitle{ font-size: 15px; line-height: 1.8; }
  .cover .scope-badge{ font-size: 14px; padding: 8px 16px; }
  .cover .hint{ font-size: 13px; margin-top: 18px; }

  .section-divider .eyebrow{ font-size: 14px; }
  .section-divider .big-word{ font-size: 40px; line-height: 1.4; }
  .section-divider .desc{ font-size: 15px; line-height: 1.8; }

  .top-row{ margin-bottom: 12px; padding-bottom: 10px; }
  .group-tag{ font-size: 12px; padding: 3px 10px; }

  .phrase-block{ margin: 4px 0 14px; }
  .phrase-arabic{ font-size: 24px; line-height: 1.7; }
  .phrase-meaning{ font-size: 15px; margin-top: 4px; }

  .ayah-card{ padding: 14px 14px; margin-bottom: 12px; border-right-width: 4px; }
  .ayah-arabic{ font-size: 19px; line-height: 1.9; margin-bottom: 10px; }
  .ayah-translation{ font-size: 14px; line-height: 1.8; }

  .ref-row{ gap: 6px; margin-bottom: 12px; }
  .ref-pill{ font-size: 12px; padding: 5px 12px; }

  .note-block{ font-size: 14px; line-height: 1.8; padding-top: 10px; }

  .toc-btn{
    top: 12px;
    left: 12px;
    font-size: 13px;
    padding: 7px 14px;
  }

  .nav-controls{
    bottom: 14px;
    gap: 12px;
  }
  .nav-btn{
    width: 40px;
    height: 40px;
    font-size: 17px;
  }
  .nav-progress{ font-size: 12px; min-width: 50px; }

  .toc-panel{
    width: 92vw;
    max-height: 78vh;
    padding: 20px;
  }
  .toc-panel h2{ font-size: 20px; }
  .toc-item{ padding: 10px 12px; }
  .toc-item .toc-phrase{ font-size: 16px; }
  .toc-item .toc-ref{ font-size: 12px; }
}

@media (max-width: 380px){
  .phrase-arabic{ font-size: 21px; }
  .ayah-arabic{ font-size: 17px; }
  .section-divider .big-word{ font-size: 32px; }
}
</style>
</head>
<body>

<div class="deck" id="deck"></div>

<button class="toc-btn" onclick="toggleTOC(true)">فہرست ☰</button>

<div class="nav-controls">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)" aria-label="پچھلا">‹</button>
  <div class="nav-progress" id="progress">1 / 1</div>
  <button class="nav-btn" id="nextBtn" onclick="go(1)" aria-label="اگلا">›</button>
</div>

<div class="toc-overlay" id="tocOverlay">
  <div class="toc-panel">
    <h2>فہرستِ مضامین</h2>
    <div id="tocList"></div>
    <button class="toc-close" onclick="toggleTOC(false)">بند کریں ✕</button>
  </div>
</div>

<script src="Data.js"></script>
<script>
// Build the full slide list: cover, section dividers, and word slides
const deck = [];

deck.push({ type: 'cover' });
deck.push({
  type: 'section',
  eyebrow: 'یونٹ ۳ — سبق ۴',
  big: 'رَبّ و یَوْم',
  desc: 'اضافت کے ذریعے بننے والے الفاظ — جیسے "رَبُّ الْعَرْشِ" یا "یَوْمُ الدِّینِ"۔ ہر مثال پارہ ۲۵ تا ۳۰ سے قرآنی حوالے کے ساتھ۔'
});

SLIDES.filter(s => s.chapter === '4').forEach(s => deck.push({ type: 'word', data: s }));

deck.push({
  type: 'section',
  eyebrow: 'یونٹ ۳ — سبق ۷',
  big: 'کُلّ',
  desc: '"کُلّ" کا مطلب اردو میں "ہر" ہے۔ یہ لفظ جب دوسرے الفاظ کی طرف نسبت پاتا ہے تو "ہر ایک چیز"، "ہر جان" جیسے مفہوم بنتا ہے۔'
});

SLIDES.filter(s => s.chapter === '7').forEach(s => deck.push({ type: 'word', data: s }));

deck.push({
  type: 'section',
  eyebrow: 'اضافی الفاظ',
  big: 'متفرق اضافتیں',
  desc: 'خَلْق، اِمْرَأَة، عَذَاب، ذُو/ذِي اور کُلّ سے مزید قرآنی مثالیں — پارہ ۲۵ تا ۳۰ سے۔'
});

SLIDES.filter(s => s.chapter === 'extra').forEach(s => deck.push({ type: 'word', data: s }));
let current = 0;

function renderSlide(item, idx){
  const el = document.createElement('div');
  el.className = 'slide';
  el.dataset.index = idx;

  if(item.type === 'cover'){
    el.innerHTML = `
      <div class="card">
        <div class="card-inner">
          <div class="cover">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمٰنِ الرَّحِیمِ</div>
            <h1>اضافت کے قرآنی الفاظ</h1>
            <div class="subtitle">معیار القرآن کی مشقوں سے منتخب الفاظ، حقیقی قرآنی آیات، سورت اور آیت کے حوالے کے ساتھ۔</div>
            <div class="scope-badge">📖 حوالہ جات پارہ ۲۵ تا ۳۰ سے لیے گئے ہیں</div>
          </div>
        </div>
      </div>`;
  } else if(item.type === 'section'){
    el.innerHTML = `
      <div class="card">
        <div class="card-inner">
          <div class="section-divider">
            <div class="eyebrow">${item.eyebrow}</div>
            <div class="big-word">${item.big}</div>
            <div class="desc">${item.desc}</div>
          </div>
        </div>
      </div>`;
  } else if(item.type === 'word'){
    const d = item.data;
    el.innerHTML = `
      <div class="card">
        <div class="card-inner">
          <div class="top-row">
            <span class="group-tag">${d.group} — سبق ${d.chapter}</span>
          </div>
          <div class="phrase-block">
            <p class="phrase-arabic">${d.phrase}</p>
            <p class="phrase-meaning">${d.meaning}</p>
          </div>
          <div class="ayah-card">
            <p class="ayah-arabic">${d.ayahArabic}</p>
            <p class="ayah-translation">${d.translation}</p>
          </div>
          <div class="ref-row">
            <span class="ref-pill">${d.surahUrdu} — ${d.ayahRef}</span>
            <span class="ref-pill juz">${d.juz}</span>
          </div>
          <div class="note-block"><span class="note-label">نکتہ:</span>${d.note}</div>
        </div>
      </div>`;
  }
  return el;
}

function buildDeck(){
  const container = document.getElementById('deck');
  container.innerHTML = '';
  deck.forEach((item, idx) => {
    container.appendChild(renderSlide(item, idx));
  });
  showSlide(0);
  buildTOC();
}

function showSlide(idx){
  if(idx < 0) idx = 0;
  if(idx >= deck.length) idx = deck.length - 1;
  current = idx;
  document.querySelectorAll('.slide').forEach((s, i) => {
    s.classList.toggle('active', i === current);
  });
  document.getElementById('progress').textContent = `${current+1} / ${deck.length}`;
}

function go(dir){
  showSlide(current + dir);
}

function buildTOC(){
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  deck.forEach((item, idx) => {
    if(item.type === 'cover') return;
    if(item.type === 'section'){
      const label = document.createElement('div');
      label.className = 'toc-section-label';
      label.textContent = `${item.eyebrow} — ${item.big}`;
      list.appendChild(label);
      return;
    }
    const d = item.data;
    const row = document.createElement('div');
    row.className = 'toc-item';
    row.onclick = () => { showSlide(idx); toggleTOC(false); };
    row.innerHTML = `
      <span class="toc-phrase">${d.phrase}</span>
      <span class="toc-ref">${d.surahUrdu} ${d.ayahRef}</span>`;
    list.appendChild(row);
  });
}

function toggleTOC(open){
  document.getElementById('tocOverlay').classList.toggle('open', open);
}

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') go(1);   // RTL: left arrow = next
  if(e.key === 'ArrowRight') go(-1); // RTL: right arrow = prev
  if(e.key === 'Escape') toggleTOC(false);
});

// swipe support
let touchStartX = null;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 50){
    if(dx < 0) go(1); else go(-1);
  }
  touchStartX = null;
});

buildDeck();
</script>
</body>
</html>
